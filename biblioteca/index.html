<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca IA | Antigravity</title>
  <link rel="stylesheet" href="../07_Estudos_Markdown/assets/estudos.css" />
  <style>
    .lib-grid-premium {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3rem;
    }
    .category-title {
      grid-column: 1 / -1;
      margin: 2rem 0 1rem;
      font-size: 1.5rem;
      color: var(--accent);
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
    }
    .file-card-premium {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
    }
    .file-card-premium:hover {
      border-color: var(--accent2);
      background: rgba(78,240,161,0.05);
      transform: translateX(5px);
    }
    .file-icon-box {
      font-size: 2rem;
      min-width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .file-details strong { display: block; font-size: 0.95rem; margin-bottom: 2px; }
    .file-details span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">📚 <span>Biblioteca IA</span></a>
    <nav>
      <a href="../index.html">🏠 Home</a>
      <a href="../updown/index.html">↕️ UpDown</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div>
        <span class="eyebrow">📂 Repositório Central de Evidências</span>
        <h1>Fontes Originais</h1>
        <p>Acesso direto aos seus 186+ arquivos PDF e Word. Todos os protocolos da Santa Casa e diretrizes internacionais em um só lugar.</p>
      </div>
    </section>
    
    <div id="libContainer">
      <p class="muted">📦 Sincronizando arquivos clínicos...</p>
    </div>
  </main>

<script>
const resgateData = {
  "updatedAt": "2026-05-08",
  "groups": [
    {
      "category": "Protocolos Santa Casa (SCMS)",
      "files": [
        {"name": "Master Protocolos 2026", "path": "05_Biblioteca_IA/inbox/00_MASTER_COMPLETO_11_Protocolos_SantaCasa_2026.pdf"},
        {"name": "Todos Protocolos Clínica Médica", "path": "05_Biblioteca_IA/inbox/00_TODOS_Protocolos_Clinica_Medica_SantaCasa_2026.pdf"},
        {"name": "SEPSE - Bundle 1h", "path": "05_Biblioteca_IA/inbox/01_Protocolo_SEPSE_Bundle1hHora.pdf"},
        {"name": "Protocolo Hiponatremia", "path": "05_Biblioteca_IA/inbox/08_Protocolo_Hiponatremia.pdf"},
        {"name": "Insuficiência Cardíaca Aguda", "path": "05_Biblioteca_IA/inbox/09_Protocolo_IC_Aguda.pdf"}
      ]
    },
    {
      "category": "Ventilação Mecânica & UTI",
      "files": [
        {"name": "Atlas de Ventilação", "path": "05_Biblioteca_IA/inbox/VENTILA-ATLAS.pdf"},
        {"name": "Guia Ventila Cards", "path": "05_Biblioteca_IA/inbox/VENTILA-CARDS-GUIA.pdf"},
        {"name": "VM Suporte Respiratório", "path": "05_Biblioteca_IA/inbox/VM_Suporte_Respiratorio_DrAldenir.pdf"},
        {"name": "SDRA - VM Protetora", "path": "05_Biblioteca_IA/inbox/SDRA_VM_Protetora_DrAldenir.pdf"},
        {"name": "Desmame da VM", "path": "05_Biblioteca_IA/inbox/Desmame da VM.docx"}
      ]
    },
    {
      "category": "TEMI & R3",
      "files": [
        {"name": "Simulado TEMI 2026", "path": "05_Biblioteca_IA/inbox/Simulado_TEMI_2026_DrAldenir.pdf"},
        {"name": "Banco de Questões TEMI", "path": "05_Biblioteca_IA/inbox/10_Banco_Questoes_TEMI_2026.pdf"},
        {"name": "Pocket Cards Clínica Médica", "path": "05_Biblioteca_IA/inbox/11_Pocket_Cards_Clinica_Medica.pdf"}
      ]
    }
  ]
};

function loadLib() {
    const container = document.getElementById('libContainer');
    container.innerHTML = resgateData.groups.map(group => `
      <h2 class="category-title">${group.category}</h2>
      <div class="lib-grid-premium">
        ${group.files.map(file => {
          const ext = file.path.split('.').pop().toLowerCase();
          const icon = ext === 'pdf' ? '📕' : (ext === 'docx' ? '📘' : '📄');
          return `
            <a class="file-card-premium" href="../${file.path}" target="_blank">
              <div class="file-icon-box">${icon}</div>
              <div class="file-details">
                <strong>${file.name}</strong>
                <span>Formato: ${ext}</span>
              </div>
            </a>
          `;
        }).join('')}
      </div>
    `).join('');
}
loadLib();
</script>
</body>
</html>
